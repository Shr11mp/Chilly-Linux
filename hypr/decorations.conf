# =========================
# Imports
# =========================

source = ./_vars.conf
source = /home/*/.config/hypr/noctalia/noctalia-colors.conf

# =========================
# General
# =========================
general {
    gaps_in=$space
    gaps_out=$spaceXl

    border_size=$spaceXs

    col.active_border = $primary $tertiary 45deg
    col.inactive_border = $surface

    layout=dwindle
}

# =========================
# Decoration
# =========================
decoration {
    rounding=$space

    inactive_opacity = 0.$spaceMd

    blur {
        enabled=yes
        size=$spaceMd
        passes=$spaceXs
        new_optimizations=yes
    }

    shadow {
        enabled=yes
        range=$spaceMd
        render_power=$spaceSm
        color=$surface
    }
}

# =========================
# Animations
# =========================

animations {
    enabled=yes

    bezier=ease,0.4,0.02,0.21,1

    animation=windows,1,3.5,ease,slide
    animation=windowsOut,1,3.5,ease,slide
    animation=border,1,6,default
    animation=fade,1,3,ease
    animation=workspaces,1,3.5,ease
}
